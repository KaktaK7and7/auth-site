<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Мелисса | Ziren</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b1020;
      color: white;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      padding: 16px 24px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .topbar a {
      color: white;
      text-decoration: none;
      margin-right: 12px;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
    }

    .layout {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 20px;
    }

    .card {
      background: #121933;
      border-radius: 16px;
      padding: 16px;
    }

    .messages {
      height: 500px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 12px;
    }

    .msg {
      padding: 10px 14px;
      border-radius: 12px;
      max-width: 80%;
    }

    .user {
      background: #5d6bff;
      align-self: flex-end;
    }

    .assistant {
      background: #20294c;
      align-self: flex-start;
    }

    .chat-form {
      display: flex;
      gap: 10px;
    }

    .chat-form input {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: #0f1530;
      color: white;
    }

    .chat-form button {
      padding: 12px 16px;
      border-radius: 10px;
      border: none;
      background: #7c5cff;
      color: white;
      cursor: pointer;
    }

    .presets button {
      display: block;
      width: 100%;
      margin-bottom: 8px;
      padding: 10px;
      border-radius: 10px;
      border: none;
      background: #1c2440;
      color: white;
      cursor: pointer;
    }

    pre {
      font-size: 12px;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>

<div class="topbar">
  <div>
    <a href="/">Главная</a>
    <a href="/assistant">Назад</a>
  </div>
  <a href="/logout">Выйти</a>
</div>

<div class="container">
  <h1 id="name">Мелисса</h1>
  <p id="role">загрузка...</p>

  <div class="layout">

    <!-- ЧАТ -->
    <div class="card">
      <div class="messages" id="messages"></div>

      <form class="chat-form" id="form">
        <input id="input" placeholder="Напиши..." />
        <button>Отправить</button>
      </form>

      <div>
        session: <span id="session">0</span>
      </div>
    </div>

    <!-- НАСТРОЙКИ -->
    <div class="card">

      <h3>Характер</h3>

      <div class="presets">
        <button data="cute">Милая</button>
        <button data="calm">Спокойная</button>
        <button data="spicy">Пошлая</button>
        <button data="friend">Подруга</button>
        <button data="shy_love">Тайно влюблена</button>
        <button data="aggressive">Агрессивная</button>
      </div>

      <h3>Память</h3>
      <pre id="memory"></pre>

    </div>

  </div>
</div>

<script src="/assistant-chat.js"></script>

</body>
</html>

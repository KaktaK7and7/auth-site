<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Мелисса | Ziren</title>

  <!-- ГЛАВНЫЙ CSS -->
  <link rel="stylesheet" href="/style.css">
</head>

<body>

<!-- НАВБАР -->
<div class="topbar">
  <div>
    <a href="/">Главная</a>
    <a href="/assistant">Назад</a>
  </div>
  <a href="/logout">Выйти</a>
</div>

<div class="container">

  <h1 id="name">Мелисса</h1>
  <p id="role">загрузка...</p>

  <div class="layout chat-appear">

  <!-- ЧАТ -->
  <div class="chat-card">

    <div class="messages" id="messages"></div>

    <form class="chat-form" id="form">
      <input id="input" placeholder="Напиши..." />
      <button type="submit">Отправить</button>
    </form>

    <div class="chat-bottom-row">
      <span>session: <span id="session">0</span></span>
      <button id="new-chat-btn" type="button">Новый чат</button>
    </div>

  </div>

  <!-- ПАНЕЛЬ -->
  <div class="chat-sidebar">

    <h3>Имя ассистента</h3>

    <div class="name-box">
      <input id="assistant-name-input" placeholder="Мелисса" />
      <button id="save-name-btn">Сохранить</button>
    </div>

    <h3>Характер</h3>

    <div class="presets">
      <button data="cute">Милая</button>
      <button data="calm">Спокойная</button>
      <button data="spicy">Пошлая</button>
      <button data="friend">Подруга</button>
      <button data="shy_love">Тайно влюблена</button>
      <button data="aggressive">Агрессивная</button>
    </div>

    <h3>Память</h3>
    <button class="memory-toggle" id="memory-toggle" type="button">Управлять памятью</button>
    <div id="memory"></div>

  </div>

</div>

</div>

<div class="memory-modal" id="memory-modal" hidden>
  <div class="memory-modal__backdrop" data-memory-close></div>
  <div class="memory-modal__dialog" role="dialog" aria-modal="true" aria-labelledby="memory-modal-title">
    <div class="memory-modal__header">
      <h2 id="memory-modal-title">Управление памятью</h2>
      <button class="memory-modal__close" type="button" id="memory-modal-close" aria-label="Закрыть">×</button>
    </div>

    <form class="memory-form" id="memory-form">
      <textarea id="memory-input" rows="3" placeholder="Новый факт для памяти"></textarea>
      <button type="submit">Добавить</button>
    </form>

    <div class="memory-items" id="memory-items"></div>

    <button class="memory-clear" id="memory-clear-btn" type="button">Очистить всю память</button>
  </div>
</div>

<script src="/assistant-chat.js"></script>



</body>
</html>

<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Мелисса | Ziren</title>

  <!-- ГЛАВНЫЙ CSS -->
  <link rel="stylesheet" href="/style.css">
</head>

<body>

<!-- НАВБАР -->
<div class="topbar">
  <div>
    <a href="/">Главная</a>
    <a href="/assistant">Назад</a>
  </div>
  <a href="/logout">Выйти</a>
</div>

<div class="container">

  <h1 id="name">Мелисса</h1>
  <p id="role">загрузка...</p>

  <div class="layout chat-appear">

    <!-- ЧАТ -->
    <div class="card">

      <div class="messages" id="messages"></div>

      <form class="chat-form" id="form">
        <input id="input" placeholder="Напиши..." />
        <button type="submit">Отправить</button>
      </form>

      <div>
        session: <span id="session">0</span>
      </div>

    </div>

    <!-- ПАНЕЛЬ -->
    <div class="card">

      <h3>Характер</h3>

      <div class="presets">
        <button data="cute">Милая</button>
        <button data="calm">Спокойная</button>
        <button data="spicy">Пошлая</button>
        <button data="friend">Подруга</button>
        <button data="shy_love">Тайно влюблена</button>
        <button data="aggressive">Агрессивная</button>
      </div>

      <h3>Память</h3>
      <div id="memory"></div>

    </div>

  </div>

</div>

<script src="/assistant-chat.js"></script>

<div id="chat-widget">
  <iframe src="/assistant/chat"></iframe>
</div>

<div id="chat-toggle">💬</div>

<script>
  const toggle = document.getElementById("chat-toggle");
  const widget = document.getElementById("chat-widget");

  toggle.onclick = () => {
    widget.classList.toggle("open");
  };
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Вход — Ziren</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-glow glow-1"></div>
  <div class="bg-glow glow-2"></div>

  <header class="header">
    <div class="container nav">
      <a href="index.html" class="brand">
        <img src="images/Ziren.png" alt="Ziren logo" class="brand-logo" />
        <span>Ziren</span>
      </a>

      <nav class="nav-links">
        <a href="index.html">Главная</a>
        <a href="assistant.html">Ассистент</a>
      </nav>

      <div class="nav-actions">
        <a class="btn btn-secondary" href="register.html">Регистрация</a>
      </div>
    </div>
  </header>

  <main class="auth-page">
    <section class="auth-section container">
      <div class="auth-card">
        <span class="section-kicker">Авторизация</span>
        <h1>Вход в аккаунт</h1>
        <p class="auth-subtitle">
          Войди в аккаунт Ziren, чтобы получить доступ к экосистеме и функциям ассистента.
        </p>

        <!-- 🔴 ВОТ БЛОК ОШИБКИ -->
        <p id="login-error" class="auth-error"></p>

        <form action="/login" method="POST" class="auth-form">
          <input type="email" name="email" placeholder="Email" required />
          <input type="password" name="password" placeholder="Пароль" required />
          <button class="btn btn-primary" type="submit">Войти</button>
        </form>

        <p class="auth-switch">
          Нет аккаунта?
          <a href="register.html">Зарегистрироваться</a>
        </p>
      </div>
    </section>
  </main>

  <!-- 🔥 СКРИПТ ДЛЯ ОШИБКИ -->
  <script>
    const params = new URLSearchParams(window.location.search);
    const error = params.get("error");
    const errorBox = document.getElementById("login-error");

    if (error && errorBox) {
      errorBox.textContent = decodeURIComponent(error);
    }
  </script>
</body>
</html>
